<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>小畫家 - 兒童著色</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body {
    height:100%; width:100%; overflow:hidden; position:fixed; inset:0;
    overscroll-behavior:none; touch-action:none;
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  body { background:#fff; }
  .soundbtn {
    position:fixed; top:12px; right:14px; z-index:60;
    width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    font-size:22px; background:#ffffffcc; box-shadow:0 3px 0 rgba(0,0,0,.2);
  }
  .soundbtn:active { transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,.2); }
  .soundbtn.off { filter:grayscale(1) opacity(.6); }
  .screen { position:fixed; top:0; left:0; width:100%; height:var(--app-h,100%); display:none; }
  .screen.active { display:block; }

  /* ---------- 共用背景 ---------- */
  .sky { width:100%; height:100%;
    background:linear-gradient(#5fc2ec 0%, #8fd6f0 55%, #bfe9f7 100%); }

  /* ---------- 首頁 / 分類 ---------- */
  #home .title {
    position:absolute; top:6%; left:0; right:0; text-align:center;
    font-size:13vw; font-weight:900; color:#ffd84d;
    -webkit-text-stroke:6px #3a8a36; text-shadow:0 6px 0 rgba(0,0,0,.15);
    letter-spacing:.3em;
  }
  .topbtn {
    position:absolute; top:18px; padding:10px 18px; border:none; border-radius:16px;
    font-size:18px; font-weight:800; color:#fff; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.2);
  }
  .topbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.2); }
  #home .parent { left:18px; background:#9fd55b; }
  #home .unlock { right:18px; background:#5bb84a; }
  .blob {
    position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    width:min(70vw,560px); height:min(70vw,560px);
    display:grid; place-items:center;
  }
  .blob svg { width:100%; height:100%; filter:drop-shadow(0 8px 10px rgba(0,0,0,.15)); }
  .enter-hint { position:absolute; bottom:6%; left:0; right:0; text-align:center;
    color:#fff; font-size:4.5vw; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.2);
    animation:pulse 1.4s infinite; }
  @keyframes pulse { 50%{opacity:.55} }

  /* ---------- 動物選擇格 ---------- */
  #grid .back { left:18px; top:18px; background:#7ec8e3; }
  /* 畫風選擇列 */
  #grid .stylebar {
    position:absolute; top:20px; left:72px; right:66px; z-index:5;
    display:flex; gap:6px; justify-content:center; flex-wrap:nowrap;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .stylebtn {
    flex:0 0 auto; padding:8px 13px; border:none; border-radius:14px; cursor:pointer;
    font-size:16px; font-weight:800; color:#fff; background:#7ec8e3; white-space:nowrap;
    box-shadow:0 3px 0 rgba(0,0,0,.18);
  }
  .stylebtn.sel { background:#ffb13d; box-shadow:0 0 0 3px #fff inset, 0 3px 0 rgba(0,0,0,.18); }
  .stylebtn:active { transform:translateY(2px); box-shadow:none; }
  .grid-wrap {
    position:absolute; inset:96px 4% 4% 4%;
    display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:1fr; gap:2.2vmin;
    align-content:center;
  }
  .card {
    background:#fff; border:5px solid #9fd836; border-radius:18px;
    display:grid; place-items:center; cursor:pointer; position:relative; overflow:hidden;
    box-shadow:0 5px 0 rgba(0,0,0,.12); transition:transform .08s;
  }
  .card:active { transform:scale(.94); }
  .card svg, .card img { width:82%; height:82%; object-fit:contain; }
  .card .lock {
    position:absolute; right:6px; bottom:6px; width:26px; height:26px; border-radius:50%;
    background:#7bc043; display:grid; place-items:center; font-size:15px; box-shadow:0 2px 3px rgba(0,0,0,.3);
  }
  /* 畫過的圖：左上角綠勾 */
  .card .done {
    position:absolute; left:6px; top:6px; width:26px; height:26px; border-radius:50%;
    background:#34c759; color:#fff; font-weight:900; display:grid; place-items:center;
    font-size:16px; box-shadow:0 2px 3px rgba(0,0,0,.3);
  }

  /* ---------- 著色畫面 ---------- */
  #paint .stage { position:absolute; inset:0 248px 0 0; background:#fff; display:grid; place-items:center; }
  #paint .stage canvas { position:absolute; touch-action:none; }
  #lineCv { pointer-events:none; }   /* 線稿層不攔截觸控，讓畫筆層收得到 */
  #paint .stage .gloss {
    position:absolute; inset:0; pointer-events:none; z-index:6;
    background:
      radial-gradient(140% 90% at 18% 8%, rgba(255,255,255,.5), rgba(255,255,255,0) 42%),
      linear-gradient(115deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 30%);
  }
  #cvHome { left:14px; top:14px; position:absolute; z-index:5; background:#7ec8e3; padding:8px 14px; }
  /* 貼紙挑選列：只有選「貼紙」工具時出現 */
  #stickerTray {
    position:absolute; left:8px; right:8px; bottom:8px; z-index:8;
    display:none; gap:6px; padding:8px; border-radius:16px;
    background:rgba(255,255,255,.9); box-shadow:0 3px 12px rgba(0,0,0,.2);
    overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; touch-action:pan-x;
  }
  #stickerTray.show { display:flex; }
  #stickerTray button {
    flex:0 0 auto; width:52px; height:52px; border:none; border-radius:12px;
    background:#fff; font-size:30px; cursor:pointer; box-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  #stickerTray button.sel { box-shadow:0 0 0 3px #ffd84d, 0 2px 0 rgba(0,0,0,.12); }
  #stickerTray button:active { transform:translateY(2px); }

  .panel {
    position:absolute; right:0; top:0; bottom:0; width:248px;
    background:linear-gradient(#79c3cf,#5aa9b5); display:flex; flex-direction:row;
    box-shadow:-3px 0 8px rgba(0,0,0,.15); z-index:10;
  }
  /* 顏色：自成一直欄，14 色一次全部顯示 */
  .colcol { flex:0 0 52px; display:flex; flex-direction:column; gap:6px;
    justify-content:center; padding:8px 5px; }
  .swatch {
    width:100%; aspect-ratio:1/1; border-radius:50%; border:3px solid #fff; cursor:pointer;
    box-shadow:0 3px 5px rgba(0,0,0,.25); transition:transform .08s;
  }
  .swatch.sel { box-shadow:0 0 0 4px #ffd84d, 0 3px 5px rgba(0,0,0,.25); transform:scale(1.1); }
  .swatch:active { transform:scale(.9); }
  /* 工具 + 動作鈕：另成一欄，工具自動撐滿、一次顯示完整 */
  .toolcol { flex:1; display:flex; flex-direction:column; min-height:0; padding:8px 8px 10px 2px; }
  .tools { flex:1; min-height:0; display:grid; grid-template-columns:repeat(2,1fr); grid-auto-rows:1fr; gap:7px; }
  .tool {
    border-radius:16px; border:none; cursor:pointer; min-height:0;
    display:grid; place-items:center; background:rgba(255,255,255,.18); transition:transform .08s;
  }
  .tool svg { width:72%; height:72%; max-width:50px; max-height:50px; display:block; pointer-events:none;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }
  .tool.sel { background:rgba(255,255,255,.7); box-shadow:0 0 0 4px #ffd84d inset; transform:scale(1.06); }
  .tool:active { transform:scale(.9); }
  .bottom { flex:0 0 auto; display:flex; justify-content:center; gap:8px; padding-top:8px; }
  .bottom button {
    width:52px; height:52px; border-radius:14px; border:none; cursor:pointer; font-size:25px;
    background:#bfe2ea; box-shadow:0 3px 0 rgba(0,0,0,.18);
  }
  .bottom button:disabled { opacity:.35; box-shadow:none; }
  .bottom button:active { transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,.18); }
</style>
</head>
<body>

<button id="soundBtn" class="soundbtn" title="聲音開關">🔊</button>

<!-- ============ 首頁 / 分類 ============ -->
<section id="home" class="screen active">
  <div class="sky"></div>
  <button class="topbtn parent">👨‍👩‍👧 專為家長</button>
  <div class="title">動 物</div>
  <div class="blob" onclick="openGrid()">
    <svg viewBox="0 0 200 200"><path d="M100 18c20-6 40 6 44 24 22-4 40 14 36 36 16 12 14 40-4 50 6 22-12 42-34 40-10 18-36 20-50 6-16 12-42 4-46-16-22 2-40-18-32-38C30 110 30 84 50 76 44 54 64 34 86 40c2-12 14-22 14-22z" fill="#8cc63f" stroke="#5a9a1e" stroke-width="3"/></svg>
  </div>
</section>

<!-- ============ 動物選擇格 ============ -->
<section id="grid" class="screen">
  <div class="sky"></div>
  <button class="topbtn back" onclick="show('home')">⬅</button>
  <div class="stylebar" id="catBar"></div>
  <div class="grid-wrap" id="gridWrap"></div>
</section>

<!-- ============ 著色畫面 ============ -->
<section id="paint" class="screen">
  <button class="topbtn" id="cvHome" onclick="leavePaint()">⬅</button>
  <div class="stage" id="stage">
    <canvas id="paintCv"></canvas>
    <canvas id="lineCv"></canvas>
    <div class="gloss"></div>
    <div id="stickerTray"></div>
  </div>
  <div class="panel">
    <div class="colcol" id="colorBar"></div>
    <div class="toolcol">
      <div class="tools" id="toolBar"></div>
      <div class="bottom">
        <button id="undoBtn" title="復原">↩️</button>
        <button id="redoBtn" title="重做">↪️</button>
        <button id="clearBtn" title="全部清除">🗑️</button>
      </div>
    </div>
  </div>
</section>

<script>
/* ======================================================================
   圖庫：每張圖是一段 SVG 線稿（黑線、白底、區域封閉以利「填滿」工具）
   viewBox 一律 0 0 400 400
   ====================================================================== */
const S = 'stroke="#000" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"';
/* SG = 烤畫/彩繪玻璃風：超粗黑框、圖案切成格子 */
const SG = 'stroke="#000" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"';
const PICTURES = [

  { name:'大象🎪', img:"pics/elephant-on-ball_eIhcgQ.png" },
  { name:'海豚', img:"pics/curious-dolphin_PmBNZ7.png" },
  { name:'海豚🐚', img:"pics/dolphin-and-shell_5IrAdK.png" },
  { name:'水獺寶寶', img:"pics/otter-with-tiny-baby.png" },
  { name:'水獺🐟', img:"pics/otter-with-a-little-fish.png" },
  { name:'水獺⚽', img:"pics/otter-with-a-ball.png" },
  { name:'水獺抱魚', img:"pics/otter-hugging-a-fish.png" },

  { name:'水母😊', img:"pics/smiling-jelly-fish_E0sLn1.png" },
  { name:'海星😊', img:"pics/smiling-starfish_2aMAmI.png" },
  { name:'海星🌟', img:"pics/starfish-with-patterned-arms_KVH0qh.png" },
  { name:'貝殼珍珠', img:"pics/seashell-with-pearl_wsGJvg.png" },
  { name:'蜜蜂🍭', img:"pics/bee-with-lollipop_Xco599.png" },
  { name:'蜜蜂🌷', img:"pics/bee-and-big-tulip_yKWbQt.png" },
  { name:'蜜蜂🍄', img:"pics/bee-on-mushroom-cap_Jfh5BP.png" },
  { name:'蜜蜂🍯', img:"pics/bee-with-honey-pot_1UYKbr.png" },
  { name:'蜘蛛🍃', img:"pics/spider-holding-leaf.png" },
  { name:'變色龍🌈', img:"pics/chameleon-with-patterned-back_sbMVZ0.png" },
  { name:'變色龍👅', img:"pics/chameleon-with-tongue-out_p9OoEX.png" },
  { name:'小龍🎩', img:"pics/dragon-wearing-hat.png" },
  { name:'小恐龍', img:"pics/baby-dragon-sitting.png" },
  { name:'太陽🎀', img:"pics/sun-with-bow_TfGqX0.png" },
  { name:'太陽😎', img:"pics/happy-sun-with-sunglasses_Brej3L.png" },
  { name:'蘑菇', img:"pics/smiling-mushroom-with-spots_pYhiHF.png" },
  { name:'香蕉鞦韆', img:"pics/banana-on-swing_XBBccN.png" },
  { name:'香蕉皮', img:"pics/banana-peel_Bhf8Fs.png" },

  { name:'蝸牛✨', svg:`
    <path d="M64 296 C44 296 46 266 76 262 C150 252 230 256 320 260 C356 262 372 282 360 298 C350 310 120 310 92 306 C76 304 70 302 64 296 Z" ${SG}/>
    <circle cx="260" cy="186" r="90" ${SG}/>
    <path d="M260 186 m0 -58 a58 58 0 1 1 -42 18 a42 42 0 1 0 30 -12 a26 26 0 1 1 -18 8 a14 14 0 1 0 10 -4" ${SG}/>
    <path d="M118 258 Q90 175 96 122" ${SG}/>
    <path d="M152 258 Q162 168 158 120" ${SG}/>
    <circle cx="96" cy="102" r="27" ${SG}/><circle cx="102" cy="102" r="11" fill="#000"/>
    <circle cx="158" cy="100" r="27" ${SG}/><circle cx="164" cy="100" r="11" fill="#000"/>
    <path d="M96 226 Q114 246 134 230" ${SG}/>
    <circle cx="106" cy="214" r="4" fill="#000"/><circle cx="124" cy="213" r="4" fill="#000"/>
    <rect x="92" y="280" width="22" height="17" rx="7" ${SG}/>
    <rect x="150" y="286" width="22" height="17" rx="7" ${SG}/>
    <rect x="210" y="280" width="22" height="17" rx="7" ${SG}/>
    <rect x="270" y="284" width="22" height="17" rx="7" ${SG}/>
    <rect x="130" y="266" width="20" height="15" rx="6" ${SG}/>` },

  { name:'警車✨', svg:`
    <path d="M38 302 V250 L78 250 L118 184 L292 184 L328 250 L362 250 V302 Z" ${SG}/>
    <rect x="176" y="156" width="48" height="28" rx="6" ${SG}/>
    <rect x="120" y="196" width="160" height="56" rx="16" ${SG}/>
    <circle cx="165" cy="224" r="17" ${SG}/><circle cx="165" cy="224" r="6" fill="#000"/>
    <circle cx="235" cy="224" r="17" ${SG}/><circle cx="235" cy="224" r="6" fill="#000"/>
    <path d="M200 196 V252" ${SG}/>
    <circle cx="120" cy="302" r="36" ${SG}/><circle cx="120" cy="302" r="14" ${SG}/>
    <circle cx="290" cy="302" r="36" ${SG}/><circle cx="290" cy="302" r="14" ${SG}/>
    <circle cx="352" cy="268" r="9" ${SG}/>` },
];


/* ====================== 畫面切換 ====================== */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const sb=document.getElementById('soundBtn');     // 著色頁靠左避開面板，其他頁回右上角
  if(sb) sb.style.right=(id==='paint')?'260px':'14px';
}
function openGrid(){ show('grid'); }

/* ====================== 分類（每個分頁顯示不同圖片）====================== */
const CATS=[
  {id:'animal', name:'🐾 動物', names:['小貓🐟','獅子🧶','兔子🥕','兔子🥬','斑馬','斑馬家族','大猩猩','松鼠','大象🎩','大象🎪','蝸牛✨']},
  {id:'sea',    name:'🌊 海洋', names:['海豚','海豚🐚','水獺寶寶','水獺🐟','水獺⚽','水獺抱魚','螃蟹','紅鶴','水母👓','水母😴','水母😊','海星😊','海星🌟','貝殼珍珠']},
  {id:'bug',    name:'🦎 蟲蟲恐龍', names:['蜜蜂🍭','蜜蜂🌷','蜜蜂🍄','蜜蜂🍯','蜘蛛🍃','變色龍🌈','變色龍👅','小龍🎩','小恐龍']},
  {id:'nature', name:'🌞 自然', names:['太陽🎀','太陽😎','蘑菇','香蕉鞦韆','香蕉皮']},
  {id:'car',    name:'🚗 交通', names:['警車✨']},
];
let curCat=0;

/* ====================== 建立選擇格（依分類過濾）====================== */
const gridWrap = document.getElementById('gridWrap');
/* 每張圖的著色成果(影像)，切換圖案會保留；只放記憶體，重整網頁(refresh)後自然清空 */
let saved={};
function buildGrid(){
  gridWrap.innerHTML='';
  const names=CATS[curCat].names;
  PICTURES.forEach((p,i)=>{
    if(!names.includes(p.name)) return;
    const d=document.createElement('div'); d.className='card';
    d.innerHTML = p.img ? `<img src="${p.img}" alt="">` : `<svg viewBox="0 0 400 400">${p.svg}</svg>`;
    if(saved[i]) d.insertAdjacentHTML('beforeend','<div class="done">✓</div>');
    d.onclick = ()=>openPicture(i);
    gridWrap.appendChild(d);
  });
}
const catBar=document.getElementById('catBar');
CATS.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='stylebtn'+(i===0?' sel':''); b.textContent=c.name;
  b.onclick=()=>{
    curCat=i;
    document.querySelectorAll('.stylebtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    buildGrid(); sfx('tool');
  };
  catBar.appendChild(b);
});
buildGrid();

/* ====================== 著色核心 ====================== */
const paintCv = document.getElementById('paintCv');
const lineCv  = document.getElementById('lineCv');
const pctx = paintCv.getContext('2d', {willReadFrequently:true});
const lctx = lineCv.getContext('2d');

let CW=1000, CH=1000;          // 畫布實際像素（滿版，依舞台大小）
let boundary;                  // 線稿像素(用來當填色邊界)
let bgMask=null;               // 背景遮罩(1=圖案外的背景)，魔法塗色用：背景不塗
let curColor = '#ff3b30';
let curTool  = 'marker';
let drawing=false, lastX=0,lastY=0;
let curPic=0, lineImg=null;
const undoStack=[], redoStack=[];
function saveCurrent(){
  if(curPic==null) return;
  try{ saved[curPic]=paintCv.toDataURL('image/png'); }catch(e){}
}
function restorePaint(i){
  const url=saved[i]; if(!url) return;
  const im=new Image();
  im.onload=()=>{ pctx.drawImage(im,0,0,CW,CH); };
  im.src=url;
}
function leavePaint(){ saveCurrent(); buildGrid(); show('grid'); }

/* 依舞台大小把畫布設成「滿版」 */
function sizeBoard(){
  const st=document.getElementById('stage');
  CW=Math.max(50,Math.round(st.clientWidth));
  CH=Math.max(50,Math.round(st.clientHeight));
  paintCv.width=lineCv.width=CW; paintCv.height=lineCv.height=CH;
  [paintCv,lineCv].forEach(c=>{ c.style.width=CW+'px'; c.style.height=CH+'px'; c.style.left='0'; c.style.top='0'; });
}
/* 滿版白底 + 線稿置中放大重繪（會清掉著色） */
function renderBoard(){
  sizeBoard();
  pctx.clearRect(0,0,CW,CH); pctx.fillStyle='#fff'; pctx.fillRect(0,0,CW,CH);
  lctx.clearRect(0,0,CW,CH);
  if(lineImg){
    const iw=lineImg.naturalWidth||400, ih=lineImg.naturalHeight||400;
    const scale=Math.min(CW*0.96/iw, CH*0.96/ih);  // 等比例置中放最大
    const dw=iw*scale, dh=ih*scale;
    lctx.drawImage(lineImg,(CW-dw)/2,(CH-dh)/2,dw,dh);
  }
  boundary=lctx.getImageData(0,0,CW,CH);
  computeBgMask();
}
/* 算出「背景」：從畫布四邊往內擴散、不跨線稿能到達的區域就是圖案外的背景。
   魔法塗色只塗「非背景」的封閉區，所以塗到圖外面不會有作用。 */
function computeBgMask(){
  const b=boundary.data, N=CW*CH;
  bgMask=new Uint8Array(N);
  const stack=[];
  const seed=(x,y)=>{ const i=y*CW+x; if(!bgMask[i] && b[i*4+3]<=60){ bgMask[i]=1; stack.push(i); } };
  for(let x=0;x<CW;x++){ seed(x,0); seed(x,CH-1); }
  for(let y=0;y<CH;y++){ seed(0,y); seed(CW-1,y); }
  while(stack.length){
    const i=stack.pop(), x=i%CW, y=(i/CW)|0;
    const tryp=j=>{ if(!bgMask[j] && b[j*4+3]<=60){ bgMask[j]=1; stack.push(j); } };
    if(x>0) tryp(i-1);
    if(x<CW-1) tryp(i+1);
    if(y>0) tryp(i-CW);
    if(y<CH-1) tryp(i+CW);
  }
}
/* 魔法塗色：點/拖曳到哪，就把那塊封閉區填滿；背景與線上不作用 → 小小孩亂塗也不出界 */
function magicAt(x,y){
  const sx=Math.round(x), sy=Math.round(y);
  if(sx<0||sy<0||sx>=CW||sy>=CH) return;
  if(bgMask && bgMask[sy*CW+sx]) return;          // 背景不塗
  const px=pctx.getImageData(sx,sy,1,1).data;     // 先看一眼，已同色就跳過(省效能)
  const nc=hexRgb(curColor);
  if(px[0]===nc.r && px[1]===nc.g && px[2]===nc.b) return;
  fill(sx,sy);
}

}

/* 座標換算 */
function pos(e){
  const r=paintCv.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*CW;
  const y=(e.clientY-r.top )/r.height*CH;
  return {x,y};
}

/* ---- 復原 / 重做 ---- */
const snapshot=()=>pctx.getImageData(0,0,CW,CH);
const restore =s=>pctx.putImageData(s,0,0);
function beginAction(){                 // 修改畫布「之前」呼叫
  undoStack.push(snapshot());
  if(undoStack.length>25) undoStack.shift();
  redoStack.length=0;                   // 有新動作就清空重做
  updateUndoBtns();
}
function undo(){ if(!undoStack.length) return; redoStack.push(snapshot()); restore(undoStack.pop()); updateUndoBtns(); sfx('undo'); }
function redo(){ if(!redoStack.length) return; undoStack.push(snapshot()); restore(redoStack.pop()); updateUndoBtns(); sfx('redo'); }
function updateUndoBtns(){
  document.getElementById('undoBtn').disabled = undoStack.length===0;
  document.getElementById('redoBtn').disabled = redoStack.length===0;
}
document.getElementById('undoBtn').onclick=undo;
document.getElementById('redoBtn').onclick=redo;
document.getElementById('clearBtn').onclick=()=>{ beginAction(); pctx.fillStyle='#fff'; pctx.fillRect(0,0,CW,CH); sfx('clear'); };

/* ---- 畫筆設定 ---- */
let rainbowHue=0;
function effColor(){
  if(curTool==='eraser') return '#ffffff';
  if(curTool==='rainbow'){ rainbowHue=(rainbowHue+9)%360; return 'hsl('+rainbowHue+',90%,55%)'; }
  return curColor;
}
function applyStroke(){
  pctx.globalAlpha=1;
  const c=effColor(); pctx.strokeStyle=c; pctx.fillStyle=c;
  pctx.lineCap='round'; pctx.lineJoin='round';
  switch(curTool){
    case 'pencil':  pctx.lineWidth=10; break;
    case 'brush':   pctx.lineWidth=46; pctx.globalAlpha=0.8; break;
    case 'crayon':  pctx.lineWidth=30; pctx.globalAlpha=0.9; break;
    case 'neon':    pctx.lineWidth=44; pctx.globalAlpha=0.35; break;
    case 'eraser':  pctx.lineWidth=52; break;
    case 'glitter': pctx.lineWidth=34; break;
    default:        pctx.lineWidth=26; // marker / rainbow
  }
}
/* ---- 星星印章 ---- */
function stampShape(x,y){
  pctx.save(); pctx.globalAlpha=1; pctx.translate(x,y); pctx.scale(0.18,0.18); pctx.translate(-200,-200);
  pctx.fillStyle=curColor; pctx.beginPath();
  const pts=[[200,60],[234,153],[333,157],[255,218],[282,313],[200,258],[118,313],[145,218],[67,157],[166,153]];
  pts.forEach((p,i)=> i?pctx.lineTo(p[0],p[1]):pctx.moveTo(p[0],p[1]));
  pctx.closePath(); pctx.fill(); pctx.restore();
}

/* ---- 貼紙 ---- */
let curSticker='⭐';
function placeSticker(x,y){
  pctx.save(); pctx.globalAlpha=1;
  const size=Math.min(CW,CH)*0.16;
  pctx.font=size+'px "Apple Color Emoji","Segoe UI Emoji",serif';
  pctx.textAlign='center'; pctx.textBaseline='middle';
  pctx.fillText(curSticker, x, y);
  pctx.restore();
}

/* ---- 噴漆 ---- */
function spray(x,y){
  pctx.fillStyle=curColor;
  for(let i=0;i<26;i++){
    const a=Math.random()*6.28, r=Math.random()*34;
    pctx.globalAlpha=0.6;
    pctx.fillRect(x+Math.cos(a)*r, y+Math.sin(a)*r, 3,3);
  }
  pctx.globalAlpha=1;
}
/* ---- 亮粉 ---- */
function glitter(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*6.28, r=Math.random()*16;
    pctx.fillStyle = Math.random()<.4 ? '#fff' : curColor;
    pctx.beginPath(); pctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,Math.random()*3+1,0,6.28); pctx.fill();
  }
}

/* ---- 填滿（flood fill，遇黑線停止）---- */
function fill(sx,sy){
  sx=Math.round(sx); sy=Math.round(sy);
  if(sx<0||sy<0||sx>=CW||sy>=CH) return;
  const img=pctx.getImageData(0,0,CW,CH), d=img.data, b=boundary.data;
  const idx=(sy*CW+sx)*4;
  const tr=d[idx],tg=d[idx+1],tb=d[idx+2];
  const nc=hexRgb(curColor);
  if(tr===nc.r&&tg===nc.g&&tb===nc.b) return;
  const stack=[sx,sy];
  const match=(p)=> (Math.abs(d[p]-tr)<32 && Math.abs(d[p+1]-tg)<32 && Math.abs(d[p+2]-tb)<32);
  const isLine=(p)=> b[p+3]>60; // 線稿層只要有線(任何顏色)就當邊界 → 支援彩色畫風
  while(stack.length){
    const y=stack.pop(), x=stack.pop();
    let p=(y*CW+x)*4;
    if(isLine(p)||!match(p)) continue;
    // 往左
    let xl=x; let pl=p;
    while(xl>=0 && !isLine(pl) && match(pl)){ xl--; pl-=4; }
    xl++; pl+=4;
    let up=false,down=false;
    while(xl<CW){
      p=(y*CW+xl)*4;
      if(isLine(p)||!match(p)) break;
      d[p]=nc.r; d[p+1]=nc.g; d[p+2]=nc.b; d[p+3]=255;
      if(y>0){ const q=((y-1)*CW+xl)*4; const ok=!isLine(q)&&match(q); if(ok&&!up){stack.push(xl,y-1);} up=ok; }
      if(y<CH-1){ const q=((y+1)*CW+xl)*4; const ok=!isLine(q)&&match(q); if(ok&&!down){stack.push(xl,y+1);} down=ok; }
      xl++;
    }
  }
  pctx.putImageData(img,0,0);
}
function hexRgb(h){ const n=parseInt(h.slice(1),16); return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }

/* ---- 指標事件 ---- */
function start(e){
  e.preventDefault();
  const {x,y}=pos(e);
  if(curTool==='fill'){ beginAction(); fill(x,y); sfx('fill'); return; }
  beginAction();
  drawing=true; lastX=x; lastY=y;
  if(curTool==='spray'){ spray(x,y); sfx('draw'); return; }
  if(curTool==='glitter'){ glitter(x,y); sfx('draw'); return; }
  if(curTool==='stamp'){ stampShape(x,y); sfx('stamp'); return; }
  if(curTool==='magic'){ magicAt(x,y); sfx('fill'); return; }
  if(curTool==='sticker'){ placeSticker(x,y); sfx('stamp'); return; }
  sfx('draw'); applyStroke();
  pctx.beginPath(); pctx.moveTo(x,y); pctx.lineTo(x+0.1,y+0.1); pctx.stroke(); // 點一下也有
}
function move(e){
  if(!drawing) return; e.preventDefault();
  const {x,y}=pos(e);
  if(curTool==='spray'){ spray(x,y); }
  else if(curTool==='glitter'){ glitter(x,y); }
  else if(curTool==='stamp'){ if(Math.hypot(x-lastX,y-lastY)>55){ stampShape(x,y); lastX=x; lastY=y; } return; }
  else if(curTool==='magic'){ if(Math.hypot(x-lastX,y-lastY)>16){ magicAt(x,y); lastX=x; lastY=y; } return; }
  else if(curTool==='sticker'){ if(Math.hypot(x-lastX,y-lastY)>80){ placeSticker(x,y); lastX=x; lastY=y; } return; }
  else { applyStroke(); pctx.beginPath(); pctx.moveTo(lastX,lastY); pctx.lineTo(x,y); pctx.stroke(); }
  lastX=x; lastY=y;
}
function end(){ drawing=false; pctx.globalAlpha=1; }
paintCv.addEventListener('pointerdown',start);
paintCv.addEventListener('pointermove',move);
window.addEventListener('pointerup',end);

/* ====================== 音效 / 背景音樂（即時合成，無版權）====================== */
let actx=null, sfxGain=null, musGain=null, soundOn=true, bgmTimer=null, audioReady=false;
function audio(){
  if(!actx){
    actx=new (window.AudioContext||window.webkitAudioContext)();
    sfxGain=actx.createGain(); sfxGain.gain.value=0.9; sfxGain.connect(actx.destination);
    musGain=actx.createGain(); musGain.gain.value=0.4; musGain.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function note(freq,dur,type,vol,dest,when=0){
  const c=audio(), t=c.currentTime+when;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(dest||sfxGain); o.start(t); o.stop(t+dur+0.03);
}
function swoosh(){
  const c=audio(), t=c.currentTime, len=0.3;
  const buf=c.createBuffer(1, c.sampleRate*len, c.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=c.createBufferSource(); src.buffer=buf;
  const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(1800,t); f.frequency.exponentialRampToValueAtTime(400,t+len);
  const g=c.createGain(); g.gain.value=0.5;
  src.connect(f); f.connect(g); g.connect(sfxGain); src.start(t);
}
function sfx(name){
  if(!soundOn) return; audio();
  switch(name){
    case 'tool':  note(540,0.08,'square',0.18); break;
    case 'pick':  note(720,0.08,'sine',0.18); break;
    case 'draw':  note(440,0.05,'sine',0.10); break;
    case 'fill':  note(330,0.06,'sine',0.22); note(660,0.16,'sine',0.22,null,0.05); break;
    case 'stamp': note(900,0.06,'triangle',0.16); note(1320,0.09,'triangle',0.13,null,0.05); break;
    case 'undo':  note(500,0.10,'sine',0.16); note(380,0.12,'sine',0.16,null,0.06); break;
    case 'redo':  note(500,0.10,'sine',0.16); note(680,0.12,'sine',0.16,null,0.06); break;
    case 'clear': swoosh(); break;
    case 'enter': [523,659,784].forEach((f,i)=>note(f,0.3,'triangle',0.16,null,i*0.07)); break;
  }
}
/* 背景音樂：柔和琶音循環（C–G–Am–F），sine 音色、慢速、長尾相疊、輕音量 → 不刺耳 */
const ARP=[
  659,784,1047,784,   // C  : E5 G5 C6 G5
  587,784, 988,784,   // G  : D5 G5 B5 G5
  523,659, 880,659,   // Am : C5 E5 A5 E5
  523,698, 880,698    // F  : C5 F5 A5 F5
];
const BASS=[131,98,110,87]; // C3 G2 A2 F2（每小節換一次）
let mstep=0;
function bgmTick(){
  if(!soundOn) return;
  const f=ARP[mstep%ARP.length];
  if(f) note(f,0.7,'sine',0.055,musGain);           // 旋律：柔和、尾音長、彼此相疊成水洗音
  if(mstep%4===0){
    const b=BASS[(mstep/4|0)%BASS.length];
    note(b,1.5,'sine',0.085,musGain);               // 低音鋪底
    note(b*2,1.2,'sine',0.035,musGain);             // 八度增厚
  }
  mstep++;
}
function startBgm(){ if(bgmTimer) return; audio(); bgmTimer=setInterval(bgmTick,380); }
function stopBgm(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }

const soundBtn=document.getElementById('soundBtn');
soundBtn.onclick=()=>{
  soundOn=!soundOn;
  soundBtn.textContent=soundOn?'🔊':'🔇';
  soundBtn.classList.toggle('off',!soundOn);
  if(soundOn){ audio(); startBgm(); } else { stopBgm(); }
};
/* iOS 需使用者手勢才能發聲：第一次互動時啟動 */
function startAudioOnce(){ if(audioReady) return; audioReady=true; audio(); if(soundOn) startBgm(); }
window.addEventListener('pointerdown', startAudioOnce, {once:true});

/* 初始 */
function bootSize(){ lockedH=0; setAppSize(); if(!lockedH){ lockedH=window.innerHeight; document.documentElement.style.setProperty('--app-h', lockedH+'px'); } }
bootSize();
window.addEventListener('load', bootSize);
</script>
