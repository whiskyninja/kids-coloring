<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>小畫家 - 兒童著色</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body {
    height:100%; width:100%; overflow:hidden; position:fixed; inset:0;
    overscroll-behavior:none; touch-action:none;
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  body { background:#fff; }
  .soundbtn {
    position:fixed; top:12px; right:198px; z-index:60;
    width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    font-size:22px; background:#ffffffcc; box-shadow:0 3px 0 rgba(0,0,0,.2);
  }
  .soundbtn:active { transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,.2); }
  .soundbtn.off { filter:grayscale(1) opacity(.6); }
  .screen { position:fixed; top:0; left:0; width:100%; height:var(--app-h,100%); display:none; }
  .screen.active { display:block; }

  /* ---------- 共用背景 ---------- */
  .sky { width:100%; height:100%;
    background:linear-gradient(#5fc2ec 0%, #8fd6f0 55%, #bfe9f7 100%); }

  /* ---------- 首頁 / 分類 ---------- */
  #home .title {
    position:absolute; top:6%; left:0; right:0; text-align:center;
    font-size:13vw; font-weight:900; color:#ffd84d;
    -webkit-text-stroke:6px #3a8a36; text-shadow:0 6px 0 rgba(0,0,0,.15);
    letter-spacing:.3em;
  }
  .topbtn {
    position:absolute; top:18px; padding:10px 18px; border:none; border-radius:16px;
    font-size:18px; font-weight:800; color:#fff; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.2);
  }
  .topbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.2); }
  #home .parent { left:18px; background:#9fd55b; }
  #home .unlock { right:18px; background:#5bb84a; }
  .blob {
    position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    width:min(70vw,560px); height:min(70vw,560px);
    display:grid; place-items:center;
  }
  .blob svg { width:100%; height:100%; filter:drop-shadow(0 8px 10px rgba(0,0,0,.15)); }
  .enter-hint { position:absolute; bottom:6%; left:0; right:0; text-align:center;
    color:#fff; font-size:4.5vw; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.2);
    animation:pulse 1.4s infinite; }
  @keyframes pulse { 50%{opacity:.55} }

  /* ---------- 動物選擇格 ---------- */
  #grid .back { left:18px; top:18px; background:#7ec8e3; }
  .grid-wrap {
    position:absolute; inset:90px 4% 4% 4%;
    display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:1fr; gap:2.2vmin;
    align-content:center;
  }
  .card {
    background:#fff; border:5px solid #9fd836; border-radius:18px;
    display:grid; place-items:center; cursor:pointer; position:relative; overflow:hidden;
    box-shadow:0 5px 0 rgba(0,0,0,.12); transition:transform .08s;
  }
  .card:active { transform:scale(.94); }
  .card svg { width:82%; height:82%; }
  .card .lock {
    position:absolute; right:6px; bottom:6px; width:26px; height:26px; border-radius:50%;
    background:#7bc043; display:grid; place-items:center; font-size:15px; box-shadow:0 2px 3px rgba(0,0,0,.3);
  }

  /* ---------- 著色畫面 ---------- */
  #paint .stage { position:absolute; inset:0 186px 0 0; background:#fff; display:grid; place-items:center; }
  #paint .stage canvas { position:absolute; touch-action:none; }
  #lineCv { pointer-events:none; }   /* 線稿層不攔截觸控，讓畫筆層收得到 */
  #paint .stage .gloss {
    position:absolute; inset:0; pointer-events:none; z-index:6;
    background:
      radial-gradient(140% 90% at 18% 8%, rgba(255,255,255,.5), rgba(255,255,255,0) 42%),
      linear-gradient(115deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 30%);
  }
  #cvHome { left:14px; top:14px; position:absolute; z-index:5; background:#7ec8e3; padding:8px 14px; }

  .panel {
    position:absolute; right:0; top:0; bottom:0; width:186px;
    background:linear-gradient(#79c3cf,#5aa9b5); display:flex; flex-direction:column; align-items:center;
    box-shadow:-3px 0 8px rgba(0,0,0,.15); z-index:10; overflow-y:auto; touch-action:pan-y;
  }
  /* 顏色：10 個大色塊，直接點選 */
  .colors { width:100%; flex:0 0 auto; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:10px 8px 6px; }
  .swatch {
    width:100%; aspect-ratio:1/1; border-radius:50%; border:3px solid #fff; cursor:pointer;
    box-shadow:0 3px 5px rgba(0,0,0,.25); transition:transform .08s;
  }
  .swatch.sel { box-shadow:0 0 0 4px #ffd84d, 0 3px 5px rgba(0,0,0,.25); transform:scale(1.12); }
  .swatch:active { transform:scale(.9); }
  /* 工具列：加大 */
  .tools { width:100%; flex:0 0 auto; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:8px 8px 6px; }
  .tool {
    height:64px; border-radius:16px; border:none; cursor:pointer;
    display:grid; place-items:center; font-size:34px; background:rgba(255,255,255,.18);
    transition:transform .08s;
  }
  .tool.sel { background:rgba(255,255,255,.7); box-shadow:0 0 0 4px #ffd84d inset; transform:scale(1.06); }
  .tool:active { transform:scale(.9); }
  .bottom { flex:0 0 auto; display:flex; justify-content:center; gap:8px; padding:8px 0 16px; }
  .bottom button {
    width:56px; height:56px; border-radius:16px; border:none; cursor:pointer; font-size:27px;
    background:#bfe2ea; box-shadow:0 3px 0 rgba(0,0,0,.18);
  }
  .bottom button:disabled { opacity:.35; box-shadow:none; }
  .bottom button:active { transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,.18); }
</style>

<body>

<button id="soundBtn" class="soundbtn" title="聲音開關">🔊</button>

<!-- ============ 首頁 / 分類 ============ -->
<section id="home" class="screen active">
  <div class="sky"></div>
  <button class="topbtn parent">👨‍👩‍👧 專為家長</button>
  <div class="title">動 物</div>
  <div class="blob" onclick="openGrid()">
    <svg viewBox="0 0 200 200"><path d="M100 18c20-6 40 6 44 24 22-4 40 14 36 36 16 12 14 40-4 50 6 22-12 42-34 40-10 18-36 20-50 6-16 12-42 4-46-16-22 2-40-18-32-38C30 110 30 84 50 76 44 54 64 34 86 40c2-12 14-22 14-22z" fill="#8cc63f" stroke="#5a9a1e" stroke-width="3"/></svg>
  </div>
  <div class="enter-hint">▶ 點一下開始畫畫</div>
</section>

<!-- ============ 動物選擇格 ============ -->
<section id="grid" class="screen">
  <div class="sky"></div>
  <button class="topbtn back" onclick="show('home')">⬅</button>
  <div class="grid-wrap" id="gridWrap"></div>
</section>

<!-- ============ 著色畫面 ============ -->
<section id="paint" class="screen">
  <button class="topbtn" id="cvHome" onclick="show('grid')">⬅</button>
  <div class="stage" id="stage">
    <canvas id="paintCv"></canvas>
    <canvas id="lineCv"></canvas>
    <div class="gloss"></div>
  </div>
  <div class="panel">
    <div class="colors" id="colorBar"></div>
    <div class="tools" id="toolBar"></div>
    <div class="bottom">
      <button id="undoBtn" title="復原">↩️</button>
      <button id="redoBtn" title="重做">↪️</button>
      <button id="clearBtn" title="全部清除">🗑️</button>
    </div>
  </div>
</section>

/* ====================== 畫面切換 ====================== */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openGrid(){ show('grid'); }

/* ====================== 建立選擇格 ====================== */
const gridWrap = document.getElementById('gridWrap');
PICTURES.forEach((p,i)=>{
  const d=document.createElement('div'); d.className='card';
  d.innerHTML = `<svg viewBox="0 0 400 400">${p.svg}</svg>`;
  d.onclick = ()=>openPicture(i);
  gridWrap.appendChild(d);
});

/* ====================== 著色核心 ====================== */
const paintCv = document.getElementById('paintCv');
const lineCv  = document.getElementById('lineCv');
const pctx = paintCv.getContext('2d', {willReadFrequently:true});
const lctx = lineCv.getContext('2d');

let CW=1000, CH=1000;          // 畫布實際像素（滿版，依舞台大小）
let boundary;                  // 線稿像素(用來當填色邊界)
let curColor = '#ff3b30';
let curTool  = 'marker';
let drawing=false, lastX=0,lastY=0;
let curPic=0, lineImg=null;
const undoStack=[], redoStack=[];

/* 依舞台大小把畫布設成「滿版」 */
function sizeBoard(){
  const st=document.getElementById('stage');
  CW=Math.max(50,Math.round(st.clientWidth));
  CH=Math.max(50,Math.round(st.clientHeight));
  paintCv.width=lineCv.width=CW; paintCv.height=lineCv.height=CH;
  [paintCv,lineCv].forEach(c=>{ c.style.width=CW+'px'; c.style.height=CH+'px'; c.style.left='0'; c.style.top='0'; });
}
/* 滿版白底 + 線稿置中放大重繪（會清掉著色） */
function renderBoard(){
  sizeBoard();
  pctx.clearRect(0,0,CW,CH); pctx.fillStyle='#fff'; pctx.fillRect(0,0,CW,CH);
  lctx.clearRect(0,0,CW,CH);
  if(lineImg){
    const scale=Math.min(CW,CH)*0.96/400;          // 圖案盡量放大、置中
    const dw=400*scale, dh=400*scale;
    lctx.drawImage(lineImg,(CW-dw)/2,(CH-dh)/2,dw,dh);
  }
  boundary=lctx.getImageData(0,0,CW,CH);
}
function openPicture(i){
  curPic=i;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="800" height="800">${PICTURES[i].svg}</svg>`;
  const img = new Image();
  img.onload = ()=>{
    lineImg=img; show('paint');
    requestAnimationFrame(()=>{
      renderBoard();
      undoStack.length=0; redoStack.length=0; updateUndoBtns(); sfx('enter');
    });
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}
/* 把畫面高度鎖在當下值；只在「真的」改變(轉向)時才更新，忽略 Safari 工具列收合造成的微調 → 不再忽大忽小 */
let lockedH=0;
function setAppSize(){
  const h=window.innerHeight;
  if(Math.abs(h-lockedH) < 80) return;   // 工具列伸縮(小幅) → 不動，畫面固定
  lockedH=h;
  document.documentElement.style.setProperty('--app-h', h+'px');
  if(document.getElementById('paint').classList.contains('active')) renderBoard();
}
window.addEventListener('resize', setAppSize);
window.addEventListener('orientationchange', ()=> setTimeout(()=>{ lockedH=0; setAppSize(); }, 350));

/* 禁止雙指縮放、雙擊放大、橡皮筋捲動 → 固定不跑掉 */
['gesturestart','gesturechange','gestureend'].forEach(ev=>document.addEventListener(ev, e=>e.preventDefault()));
document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});
document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});

/* 座標換算 */
function pos(e){
  const r=paintCv.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*CW;
  const y=(e.clientY-r.top )/r.height*CH;
  return {x,y};
}

/* ---- 復原 / 重做 ---- */
const snapshot=()=>pctx.getImageData(0,0,CW,CH);
const restore =s=>pctx.putImageData(s,0,0);
function beginAction(){                 // 修改畫布「之前」呼叫
  undoStack.push(snapshot());
  if(undoStack.length>25) undoStack.shift();
  redoStack.length=0;                   // 有新動作就清空重做
  updateUndoBtns();
}
function undo(){ if(!undoStack.length) return; redoStack.push(snapshot()); restore(undoStack.pop()); updateUndoBtns(); sfx('undo'); }
function redo(){ if(!redoStack.length) return; undoStack.push(snapshot()); restore(redoStack.pop()); updateUndoBtns(); sfx('redo'); }
function updateUndoBtns(){
  document.getElementById('undoBtn').disabled = undoStack.length===0;
  document.getElementById('redoBtn').disabled = redoStack.length===0;
}
document.getElementById('undoBtn').onclick=undo;
document.getElementById('redoBtn').onclick=redo;
document.getElementById('clearBtn').onclick=()=>{ beginAction(); pctx.fillStyle='#fff'; pctx.fillRect(0,0,CW,CH); sfx('clear'); };

/* ---- 畫筆設定 ---- */
let rainbowHue=0;
function effColor(){
  if(curTool==='eraser') return '#ffffff';
  if(curTool==='rainbow'){ rainbowHue=(rainbowHue+9)%360; return 'hsl('+rainbowHue+',90%,55%)'; }
  return curColor;
}
function applyStroke(){
  pctx.globalAlpha=1;
  const c=effColor(); pctx.strokeStyle=c; pctx.fillStyle=c;
  pctx.lineCap='round'; pctx.lineJoin='round';
  switch(curTool){
    case 'pencil':  pctx.lineWidth=10; break;
    case 'brush':   pctx.lineWidth=46; pctx.globalAlpha=0.8; break;
    case 'crayon':  pctx.lineWidth=30; pctx.globalAlpha=0.9; break;
    case 'neon':    pctx.lineWidth=44; pctx.globalAlpha=0.35; break;
    case 'eraser':  pctx.lineWidth=52; break;
    case 'glitter': pctx.lineWidth=34; break;
    default:        pctx.lineWidth=26; // marker / rainbow
  }
}
/* ---- 星星印章 ---- */
function stampShape(x,y){
  pctx.save(); pctx.globalAlpha=1; pctx.translate(x,y); pctx.scale(0.18,0.18); pctx.translate(-200,-200);
  pctx.fillStyle=curColor; pctx.beginPath();
  const pts=[[200,60],[234,153],[333,157],[255,218],[282,313],[200,258],[118,313],[145,218],[67,157],[166,153]];
  pts.forEach((p,i)=> i?pctx.lineTo(p[0],p[1]):pctx.moveTo(p[0],p[1]));
  pctx.closePath(); pctx.fill(); pctx.restore();
}

/* ---- 噴漆 ---- */
function spray(x,y){
  pctx.fillStyle=curColor;
  for(let i=0;i<26;i++){
    const a=Math.random()*6.28, r=Math.random()*34;
    pctx.globalAlpha=0.6;
    pctx.fillRect(x+Math.cos(a)*r, y+Math.sin(a)*r, 3,3);
  }
  pctx.globalAlpha=1;
}
/* ---- 亮粉 ---- */
function glitter(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*6.28, r=Math.random()*16;
    pctx.fillStyle = Math.random()<.4 ? '#fff' : curColor;
    pctx.beginPath(); pctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,Math.random()*3+1,0,6.28); pctx.fill();
  }
}

/* ---- 填滿（flood fill，遇黑線停止）---- */
function fill(sx,sy){
  sx=Math.round(sx); sy=Math.round(sy);
  if(sx<0||sy<0||sx>=CW||sy>=CH) return;
  const img=pctx.getImageData(0,0,CW,CH), d=img.data, b=boundary.data;
  const idx=(sy*CW+sx)*4;
  const tr=d[idx],tg=d[idx+1],tb=d[idx+2];
  const nc=hexRgb(curColor);
  if(tr===nc.r&&tg===nc.g&&tb===nc.b) return;
  const stack=[sx,sy];
  const match=(p)=> (Math.abs(d[p]-tr)<32 && Math.abs(d[p+1]-tg)<32 && Math.abs(d[p+2]-tb)<32);
  const isLine=(p)=> (b[p+3]>40 && b[p]<120 && b[p+1]<120 && b[p+2]<120); // 黑色邊界
  while(stack.length){
    const y=stack.pop(), x=stack.pop();
    let p=(y*CW+x)*4;
    if(isLine(p)||!match(p)) continue;
    // 往左
    let xl=x; let pl=p;
    while(xl>=0 && !isLine(pl) && match(pl)){ xl--; pl-=4; }
    xl++; pl+=4;
    let up=false,down=false;
    while(xl<CW){
      p=(y*CW+xl)*4;
      if(isLine(p)||!match(p)) break;
      d[p]=nc.r; d[p+1]=nc.g; d[p+2]=nc.b; d[p+3]=255;
      if(y>0){ const q=((y-1)*CW+xl)*4; const ok=!isLine(q)&&match(q); if(ok&&!up){stack.push(xl,y-1);} up=ok; }
      if(y<CH-1){ const q=((y+1)*CW+xl)*4; const ok=!isLine(q)&&match(q); if(ok&&!down){stack.push(xl,y+1);} down=ok; }
      xl++;
    }
  }
  pctx.putImageData(img,0,0);
}
function hexRgb(h){ const n=parseInt(h.slice(1),16); return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }

/* ---- 指標事件 ---- */
function start(e){
  e.preventDefault();
  const {x,y}=pos(e);
  if(curTool==='fill'){ beginAction(); fill(x,y); sfx('fill'); return; }
  beginAction();
  drawing=true; lastX=x; lastY=y;
  if(curTool==='spray'){ spray(x,y); sfx('draw'); return; }
  if(curTool==='glitter'){ glitter(x,y); sfx('draw'); return; }
  if(curTool==='stamp'){ stampShape(x,y); sfx('stamp'); return; }
  sfx('draw'); applyStroke();
  pctx.beginPath(); pctx.moveTo(x,y); pctx.lineTo(x+0.1,y+0.1); pctx.stroke(); // 點一下也有
}
function move(e){
  if(!drawing) return; e.preventDefault();
  const {x,y}=pos(e);
  if(curTool==='spray'){ spray(x,y); }
  else if(curTool==='glitter'){ glitter(x,y); }
  else if(curTool==='stamp'){ if(Math.hypot(x-lastX,y-lastY)>55){ stampShape(x,y); lastX=x; lastY=y; } return; }
  else { applyStroke(); pctx.beginPath(); pctx.moveTo(lastX,lastY); pctx.lineTo(x,y); pctx.stroke(); }
  lastX=x; lastY=y;
}
function end(){ drawing=false; pctx.globalAlpha=1; }
paintCv.addEventListener('pointerdown',start);
paintCv.addEventListener('pointermove',move);
window.addEventListener('pointerup',end);

/* ====================== 顏色：10 個大色塊 ====================== */
const COLORS=['#ff3b30','#ff9500','#ffe000','#9be15d','#34c759','#00c2a8','#5ac8fa','#0a6cff','#af52de','#ff5fa2','#8b5a2b','#9e9e9e','#1a1a1a','#ffffff'];
const colorBar=document.getElementById('colorBar');
COLORS.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='swatch'+(i===0?' sel':''); b.style.background=c; b.dataset.c=c;
  b.onclick=()=>{ curColor=c; document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); sfx('pick'); };
  colorBar.appendChild(b);
});
curColor=COLORS[0];

/* ====================== 工具列 ====================== */
const TOOLS=[
  {id:'marker', icon:'🖊️', label:'麥克筆'},
  {id:'pencil', icon:'✏️', label:'色鉛筆'},
  {id:'crayon', icon:'🖍️', label:'蠟筆'},
  {id:'brush',  icon:'🖌️', label:'水彩筆'},
  {id:'neon',   icon:'🔆', label:'螢光筆'},
  {id:'spray',  icon:'💨', label:'噴漆'},
  {id:'fill',   icon:'🪣', label:'填滿'},
  {id:'glitter',icon:'✨', label:'亮粉'},
  {id:'rainbow',icon:'🌈', label:'彩虹筆'},
  {id:'stamp',  icon:'⭐', label:'星星印章'},
  {id:'eraser', icon:'🧽', label:'橡皮擦'},
];
const toolBar=document.getElementById('toolBar');
TOOLS.forEach(t=>{
  const b=document.createElement('button'); b.className='tool'+(t.id===curTool?' sel':'');
  b.textContent=t.icon; b.title=t.label; b.dataset.id=t.id;
  b.onclick=()=>{ curTool=t.id; document.querySelectorAll('.tool').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); sfx('tool'); };
  toolBar.appendChild(b);
});

/* ====================== 音效 / 背景音樂（即時合成，無版權）====================== */
let actx=null, sfxGain=null, musGain=null, soundOn=true, bgmTimer=null, audioReady=false;
function audio(){
  if(!actx){
    actx=new (window.AudioContext||window.webkitAudioContext)();
    sfxGain=actx.createGain(); sfxGain.gain.value=0.9; sfxGain.connect(actx.destination);
    musGain=actx.createGain(); musGain.gain.value=0.5; musGain.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function note(freq,dur,type,vol,dest,when=0){
  const c=audio(), t=c.currentTime+when;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(dest||sfxGain); o.start(t); o.stop(t+dur+0.03);
}
function swoosh(){
  const c=audio(), t=c.currentTime, len=0.3;
  const buf=c.createBuffer(1, c.sampleRate*len, c.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=c.createBufferSource(); src.buffer=buf;
  const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(1800,t); f.frequency.exponentialRampToValueAtTime(400,t+len);
  const g=c.createGain(); g.gain.value=0.5;
  src.connect(f); f.connect(g); g.connect(sfxGain); src.start(t);
}
function sfx(name){
  if(!soundOn) return; audio();
  switch(name){
    case 'tool':  note(540,0.08,'square',0.18); break;
    case 'pick':  note(720,0.08,'sine',0.18); break;
    case 'draw':  note(440,0.05,'sine',0.10); break;
    case 'fill':  note(330,0.06,'sine',0.22); note(660,0.16,'sine',0.22,null,0.05); break;
    case 'stamp': note(900,0.06,'triangle',0.16); note(1320,0.09,'triangle',0.13,null,0.05); break;
    case 'undo':  note(500,0.10,'sine',0.16); note(380,0.12,'sine',0.16,null,0.06); break;
    case 'redo':  note(500,0.10,'sine',0.16); note(680,0.12,'sine',0.16,null,0.06); break;
    case 'clear': swoosh(); break;
    case 'enter': [523,659,784].forEach((f,i)=>note(f,0.3,'triangle',0.16,null,i*0.07)); break;
  }
}
/* 背景音樂：原創五聲音階小循環 */
const MEL=[659,784,523,587,659,0,587,523, 440,523,659,587,523,0,392,0];
const BAS=[131,165,175,196];
let mstep=0;
function bgmTick(){
  if(!soundOn) return;
  const f=MEL[mstep%MEL.length];
  if(f) note(f,0.34,'triangle',0.09,musGain);
  if(mstep%4===0) note(BAS[(mstep/4|0)%BAS.length],0.55,'sine',0.10,musGain);
  mstep++;
}
function startBgm(){ if(bgmTimer) return; audio(); bgmTimer=setInterval(bgmTick,300); }
function stopBgm(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }

const soundBtn=document.getElementById('soundBtn');
soundBtn.onclick=()=>{
  soundOn=!soundOn;
  soundBtn.textContent=soundOn?'🔊':'🔇';
  soundBtn.classList.toggle('off',!soundOn);
  if(soundOn){ audio(); startBgm(); } else { stopBgm(); }
};
/* iOS 需使用者手勢才能發聲：第一次互動時啟動 */
function startAudioOnce(){ if(audioReady) return; audioReady=true; audio(); if(soundOn) startBgm(); }
window.addEventListener('pointerdown', startAudioOnce, {once:true});

/* 初始 */
function bootSize(){ lockedH=0; setAppSize(); if(!lockedH){ lockedH=window.innerHeight; document.documentElement.style.setProperty('--app-h', lockedH+'px'); } }
bootSize();
window.addEventListener('load', bootSize);
</script>
